<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy burden by income quintile (2024)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--navy:#182655;--blue:#4361A4;--accent:#E8833A;--muted:#5a606b;--faint:#9aa0ab;}
  body{font-family:'Inter',-apple-system,sans-serif;background:#fff;color:#23262e;-webkit-font-smoothing:antialiased;padding:14px 16px;}
  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
  .head-text{min-width:0;}
  .brand{flex-shrink:0;display:block;line-height:0;transition:opacity .2s ease;margin-top:2px;}
  .brand:hover{opacity:.7;}
  .brand-logo{height:22px;width:auto;display:block;mix-blend-mode:multiply;}
  @media(max-width:480px){.brand-logo{height:15px;}}
  .ttl{font-size:16px;font-weight:800;color:var(--navy);line-height:1.3;}
  .sub{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.45;}
  #chart{width:100%;height:320px;margin-top:8px;}
  .src{font-size:11px;color:var(--faint);margin-top:6px;line-height:1.4;}
</style>
</head>
<body>
  <header class="head">
    <div class="head-text">
      <div class="ttl">Low-income households pay 8&times; more of their income on energy</div>
      <div class="sub">Median household energy spending as a share of income, by income quintile (2024)</div>
    </div>
    <a class="brand" href="https://www.freopp.org" target="_blank" rel="noopener" aria-label="Visit FREOPP">
      <img class="brand-logo" src="freopp-logo.png" alt="FREOPP" width="111" height="22">
    </a>
  </header>
  <div id="chart"></div>
  <div class="src">Source: U.S. Census Bureau, American Community Survey PUMS (2024), weighted microdata.</div>
<script>
  const NAVY='#182655',BLUE='#4361A4',ACCENT='#E8833A';
  const FONT={family:'Inter, sans-serif',size:12,color:'#23262e'};
  Plotly.newPlot('chart',[{
    type:'bar',
    x:['Bottom 20%','Second','Middle','Fourth','Top 20%'],
    y:[9.8,4.3,2.8,2.0,1.2],
    marker:{color:[ACCENT,BLUE,BLUE,BLUE,NAVY]},
    text:['9.8%','4.3%','2.8%','2.0%','1.2%'],textposition:'outside',
    textfont:{family:'Inter, sans-serif',size:13,color:NAVY},
    hovertemplate:'%{x}<br><b>%{y:.1f}%</b> of income on energy<extra></extra>'
  }],{
    font:FONT,margin:{l:48,r:16,t:10,b:34},
    yaxis:{title:'% of household income',range:[0,11],ticksuffix:'%',gridcolor:'#eef0f3',zeroline:false},
    xaxis:{tickfont:{size:12}},
    paper_bgcolor:'#fff',plot_bgcolor:'#fff'
  },{responsive:true,displayModeBar:false});
  window.addEventListener('resize',()=>Plotly.Plots.resize('chart'));
</script>
</body>
</html>
